name: Validate Action

on:
  push:
    branches: [main]
    paths:
      - action.yml
      - src/**
      - .github/workflows/validate.yml
  pull_request:
    branches: [main]
    paths:
      - action.yml
      - src/**
      - .github/workflows/validate.yml

jobs:
  validate-action:
    name: validate-action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml syntax
        run: |
          if [ ! -f "action.yml" ]; then
            echo "❌ action.yml not found"
            exit 1
          fi
          
          # Basic YAML syntax check using grep/string matching
          if ! grep -q "^name:" action.yml; then
            echo "❌ Missing required field: name"
            exit 1
          fi
          
          if ! grep -q "^runs:" action.yml; then
            echo "❌ Missing required field: runs"
            exit 1
          fi
          
          if ! grep -q "using:" action.yml; then
            echo "❌ Missing required field: runs.using"
            exit 1
          fi
          
          # Extract and display action details
          NAME=$(grep "^name:" action.yml | head -1 | cut -d'"' -f2 | cut -d"'" -f2)
          USING=$(grep "using:" action.yml | head -1 | awk '{print $2}')
          INPUTS=$(grep -c "^  [a-z_-]*:" action.yml || echo 0)
          
          echo "✓ action.yml is valid"
          echo "  Name: ${NAME}"
          echo "  Using: ${USING}"
          echo "  Properties: ${INPUTS} defined"

      - name: Validate src/notifier.js exists
        run: |
          if [ ! -f "src/notifier.js" ]; then
            echo "❌ src/notifier.js not found"
            exit 1
          fi
          echo "✓ src/notifier.js found"

      - name: Check Node.js syntax in src/notifier.js
        run: |
          node -c src/notifier.js && echo "✓ src/notifier.js syntax valid"

      - name: ✅ All validations passed
        run: echo "Action is valid and ready to use"
