name: 'Stale Branch Notifier'
description: 'Automatically detect and notify about stale feature branches'
author: 'Arunkumar Amarnath (@amarun22)'

branding:
  icon: 'git-branch'
  color: 'green'

inputs:
  days_inactive:
    description: 'Days of inactivity before a branch is considered stale (default: 15)'
    required: false
    default: '15'
  
  dry_run:
    description: 'Dry run mode - log actions without creating issues'
    required: false
    default: 'false'
  
  watchers:
    description: 'Comma-separated GitHub usernames to CC in every issue for visibility'
    required: false
    default: ''
  
  excluded_branches:
    description: 'Comma-separated exact branch names to exclude from stale scanning'
    required: false
    default: ''

outputs:
  stale_branches_found:
    description: 'Number of stale branches detected'
    value: ${{ steps.notifier.outputs.stale_count }}
  
  issues_created:
    description: 'Number of issues created or updated'
    value: ${{ steps.notifier.outputs.issues_count }}

  issues_auto_closed:
    description: 'Number of stale issues auto-closed during reconciliation'
    value: ${{ steps.notifier.outputs.auto_closed_count }}

runs:
  using: 'composite'
  steps:
    - name: Run stale branch notifier
      id: notifier
      uses: actions/github-script@v7
      with:
        github-token: ${{ github.token }}
        script: |
          const runNotifier = require(`${process.env.GITHUB_ACTION_PATH}/src/notifier.js`);
          await runNotifier({
            github,
            context,
            core,
            inputs: {
              daysInactive: `${{ inputs.days_inactive }}`,
              dryRun: `${{ inputs.dry_run }}`,
              watchers: `${{ inputs.watchers }}`,
              excludedBranches: `${{ inputs.excluded_branches }}`,
            },
          });
